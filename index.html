<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather | today's weather</title>
    <link rel="stylesheet" href="weather.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="wrapper">
        <div id="back_arrow">
            <img src="items/bx-left-arrow-alt.svg" alt="arrow">
        </div>
        <h2>Weather Forecast</h2>
        <div id="loading_state">
            <div class="c1 circle"></div>
            <div class="c2 circle"></div>
            <div class="c4 circle"></div>
            <div class="c3 circle"></div>
            <div class="c5 circle"></div>
        </div>
        <div id="inner-wrapper">

            <form action="#">
                <input type="search" name="search" id="search_city" placeholder="Enter a city">
                <button id="search_btn">search</button>
            </form>
    
            
            <div id="results">
                <div id="city_images">
                    <img src="" alt="image" id="image">
                </div>
                <div id="current_results">

                    <div id="today_results">
                        <h1 id="city"></h1>
                        <p id="country"></p>
                        <div id="weather_details">
                            <h1 id="today_degrees"></h1>
                            <img src="" alt="" id="currentIcon" class="weather_icon">
                        </div>
                        <p id="state" class="state"></p>
                    </div>
                    
                </div>

                
                <div id="extra_results">
                    <div id="sunset_icon">
                        <img src="items/sunset-svgrepo-com.svg" alt="sunset svg">
                    </div>
                    
                    <p class="sunset_time">Sunset: 17:29</p>
        
                </div>

                <div id="following_days_results">
                   
                </div>

    
            </div>


            <div id="error">
                
            </div>
        </div>
    </div>

    <script src="weather.js"></script>
</body>
</html>
